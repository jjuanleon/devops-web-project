<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Projeto Mentoria Devops</title>
    <style>
        body {
            background-color: #7a5040;
            color: #f2f2f2;
            font-family: -apple-system, "Segoe UI", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100vh;
            margin: 0;
            padding: 40px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
        }

        header h1 {
            font-weight: 400;
            font-size: 1.6em;
            margin: 0;
            line-height: 1.4;
        }

        .conteudo {
            margin-top: 60px;
        }

        .conteudo h2 {
            font-weight: 400;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .conteudo ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .conteudo ul li {
            font-size: 0.95em;
            margin-bottom: 4px;
        }

        .conteudo ul li::before {
            content: "-";
            margin-right: 6px;
        }

        footer {
            text-align: center;
            font-size: 1.1em;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Projeto Mentoria Devops<br>com Carlos Carlassara</h1>
    </header>

    <section class="conteudo">
        <h2>Ferramentas e tecnologias<br>usadas até o momento:</h2>
        <ul>
            <li>VsCode</li>
            <li>Python</li>
            <li>Pip</li>
            <li>Flask</li>
            <li>Git</li>
            <li>GitHub</li>
            <li>Instância EC2 Amazon</li>
        </ul>
    </section>

    <footer>
        Aguarde futuras atualizações
    </footer>

</body>
</html>
